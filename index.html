<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보보안기사 실기 플래시카드</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <h1>정보보안기사 실기 플래시카드</h1>
  </header>

  <main>
    <div class="filter-bar">
      <button class="filter-btn active" data-category="전체">전체</button>
      <button class="filter-btn" data-category="위험관리">위험관리</button>
      <button class="filter-btn" data-category="시스템 보안">시스템 보안</button>
      <button class="filter-btn" data-category="네트워크 보안">네트워크 보안</button>
      <button class="filter-btn" data-category="웹/애플리케이션 보안">웹/애플리케이션 보안</button>
      <button class="filter-btn" data-category="법규 및 관리체계">법규 및 관리체계</button>
    </div>

    <div class="type-filter-bar">
      <button class="type-btn active" data-type="전체">전체 유형</button>
      <button class="type-btn" data-type="단답형">단답형</button>
      <button class="type-btn" data-type="서술형">서술형</button>
      <button class="type-btn" data-type="실무형">실무형</button>
      <span class="filter-divider">|</span>
      <button class="freq-btn active" data-freq="전체">전체 빈도</button>
      <button class="freq-btn" data-freq="최빈출">최빈출</button>
      <button class="freq-btn" data-freq="일반">일반</button>
    </div>

    <div class="controls-top">
      <div class="card-counter" id="cardCounter">1 / 0</div>
      <button class="shuffle-btn" id="shuffleBtn" title="셔플">&#x21BB; 셔플</button>
    </div>

    <div class="card-scene" id="cardScene">
      <div class="card" id="card">
        <div class="card-face card-front" id="cardFront">
          <div class="category-badge" id="categoryBadge"></div>
          <div class="card-front-content" id="cardFrontContent"></div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="category-badge" id="categoryBadgeBack"></div>
          <div class="card-back-content" id="cardBackContent"></div>
        </div>
      </div>
    </div>

    <div class="navigation">
      <button class="nav-btn" id="prevBtn" title="이전 카드">&#8592;</button>
      <button class="nav-btn" id="nextBtn" title="다음 카드">&#8594;</button>
    </div>
  </main>

  <footer>
    <p>클릭하여 뒤집기 &nbsp;|&nbsp; ← → 키로 이동 &nbsp;|&nbsp; 스페이스바로 뒤집기</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
